# render.yaml - Render deployment configuration for DocVision OCR v3
#
# This defines a single Web Service that runs both FastAPI and Gradio
# in the same process via app.py.
#
# Deploy steps:
#   1. Push your project to a GitHub repository
#   2. Go to https://render.com and click "New > Web Service"
#   3. Connect your GitHub repo
#   4. Render auto-detects this file and fills in the settings
#   5. Add GROQ_API_KEY in the Environment tab

services:
  - type: web
    name: docvision-ocr
    runtime: python
    region: oregon
    plan: starter                    # Free tier. Upgrade to "standard" for production.
    buildCommand: pip install -r requirements.txt
    startCommand: python start_render.py
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false                  # Must be set manually in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_FALLBACK_MODEL
        value: llama-3.1-8b-instant
      - key: API_PORT
        value: "8000"
      - key: GRADIO_PORT
        value: "7860"
      - key: PYTHON_VERSION
        value: "3.11.0"